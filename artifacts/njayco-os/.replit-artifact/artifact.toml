kind = "web"
previewPath = "/"
title = "NJAYCO OS"
version = "1.0.0"
id = "artifacts/njayco-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21655

[services.development]
run = "pnpm --filter @workspace/njayco-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/njayco-os", "run", "build" ]
publicDir = "artifacts/njayco-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21655"
BASE_PATH = "/"
